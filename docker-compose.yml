
services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  marketing:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./marketing:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scanner-tools:/scanner-tools
      - ./reports:/reports
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/shieldssentinel
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./scanner-tools:/scanner-tools
      - /tmp:/tmp
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/shieldssentinel
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ZAP_URL=http://zap:8090
      - REDIS_URL=redis://redis:6379/0
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis

  beat:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/shieldssentinel
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=shieldssentinel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shieldssentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8090:8090"
    mem_limit: 4G
    environment:
      - JAVA_OPTS=-Xmx2g
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.threadPerHost=2
    volumes:
      - /tmp:/zap/wrk

volumes:
  postgres_data:
